{{define "link_row"}}
<div class="card link-row" id="link-{{.ID}}"
     {{if and (ne .Status "summarized") (ne .Status "failed")}}
     hx-get="/links/{{.ID}}/row" hx-trigger="every 2s" hx-swap="outerHTML"
     {{end}}>
	<div class="meta">
		<div class="title">
			<a href="/links/{{.ID}}">{{if .Title}}{{.Title}}{{else}}{{.URL}}{{end}}</a>
		</div>
		<div class="url">{{.URL}}</div>
		{{if .Summary}}<div class="summary">{{.Summary}}</div>{{end}}
		<div class="badges">
			<span class="badge {{.Status}}">{{.Status}}</span>
			{{if .ContentLang}}<span class="badge">{{.ContentLang}}</span>{{end}}
			{{if .FetchError}}<span class="badge failed" title="{{.FetchError}}">error</span>{{end}}
		</div>
	</div>
	<div class="actions">
		<a href="{{.URL}}" target="_blank" rel="noopener noreferrer">open link ↗</a>
		<button hx-delete="/links/{{.ID}}" hx-target="#link-{{.ID}}" hx-swap="outerHTML"
		        hx-confirm="Delete this link?" class="danger">delete</button>
	</div>
</div>
{{end}}
