{{define "sidebar"}}
<aside class="sidebar">
	<div class="sidebar-section">
		<div class="sidebar-title">Collections</div>
		<nav>
			<a href="/" class="sidebar-link {{if eq .ActiveSlug ""}}active{{end}}">All</a>
			{{range .Sidebar}}
			{{template "sidebar_collection_entry" (dict "Cs" . "ActiveSlug" $.ActiveSlug)}}
			{{else}}
			<div class="muted" style="padding:.4rem .6rem">none yet</div>
			{{end}}
		</nav>
	</div>
</aside>
{{end}}
