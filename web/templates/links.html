{{define "content"}}
<section class="card">
	<div style="display:flex;align-items:center;gap:.5rem">
		<h2 style="margin:0;flex:1">{{.Collection.Name}}</h2>
		<button type="button" class="link-button"
		        onclick="document.getElementById('rename-{{.Collection.ID}}').toggleAttribute('hidden')"
		        title="rename this collection">✎ rename</button>
	</div>
	<div class="muted" style="font-size:.9rem">/c/{{.Collection.Slug}}{{if .Collection.FeedURL}} · 📡 RSS feed{{end}}</div>

	<form id="rename-{{.Collection.ID}}" class="inline" hidden style="margin-top:.5rem"
	      hx-post="/c/{{.Collection.Slug}}/rename"
	      hx-on::after-request="if (event.detail.successful) location.href='/c/'+(this.querySelector('[name=slug]').value||'{{.Collection.Slug}}')">
		<input type="text" name="name" value="{{.Collection.Name}}"
		       placeholder="new name" required>
		<input type="text" name="slug" value="{{.Collection.Slug}}"
		       placeholder="new slug" pattern="[a-z0-9\-]+">
		<button type="submit">Save</button>
		<button type="button"
		        onclick="document.getElementById('rename-{{.Collection.ID}}').setAttribute('hidden','')">Cancel</button>
	</form>

	{{template "collection_stats" .}}
	<form class="inline" style="margin-top:.75rem"
	      hx-post="/c/{{.Collection.Slug}}/links"
	      hx-target="#links-list" hx-swap="afterbegin"
	      hx-on::after-request="this.reset()">
		<input type="url" name="url" placeholder="https://…" required>
		<button type="submit">Add link</button>
	</form>
</section>

{{template "collection_feed" (dict "Collection" .Collection)}}

<div id="links-list">
	<div id="links-empty"{{if .Links}} hidden{{end}}>
		<div class="empty">No links yet.</div>
	</div>
	{{range .Links}}
		{{template "link_row" .}}
	{{end}}
</div>
{{end}}
