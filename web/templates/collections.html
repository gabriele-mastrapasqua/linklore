{{define "content"}}
<section class="card">
	<h2>Collections</h2>
	<form class="inline" hx-post="/collections" hx-target="#collections-list" hx-swap="beforeend"
	      hx-on::after-request="this.reset()">
		<input type="text" name="slug" placeholder="slug" required pattern="[a-z0-9\-]+">
		<input type="text" name="name" placeholder="Name" required>
		<button type="submit">Create</button>
	</form>
</section>

<div id="collections-list">
{{if not .Collections}}
	<div class="empty">No collections yet — create your first one above.</div>
{{end}}
{{range .Collections}}
	{{template "collection_card" .}}
{{end}}
</div>
{{end}}
