{{define "content"}}
<section class="card" id="new-collection">
	<h2>Collections</h2>
	<form class="inline" hx-post="/collections" hx-target="#collections-list" hx-swap="beforeend"
	      hx-on::after-request="this.reset()">
		<input type="text" name="name" placeholder="Collection name" required
		       autofocus
		       onload="if(location.hash==='#new-collection')this.focus()">
		<button type="submit">Create</button>
	</form>
	<div style="margin-top:.5rem;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap">
		<small class="muted">URL slug is derived automatically from the name (e.g. “My news” → /c/my-news).</small>
		<button type="button" class="link-button"
		        hx-post="/collections/prune" hx-swap="none"
		        hx-confirm="Delete every collection that has 0 links and no RSS feed? RSS-backed collections are kept even if currently empty."
		        title="Sweep all empty collections">✕ prune empty</button>
	</div>
	<form method="POST" action="/import" enctype="multipart/form-data" class="inline" style="margin-top:.5rem">
		<input type="file" name="file" accept=".html,.htm" required>
		<input type="text" name="collection" placeholder="target slug (optional — empty = group by source folder)" style="flex:1;min-width:240px">
		<button type="submit" title="Import a Netscape Bookmark File (Chrome / Firefox / Pocket / Pinboard / Raindrop)">Import</button>
	</form>
</section>

<div id="collections-list">
{{if not .Collections}}
	<div class="empty">No collections yet — create your first one above.</div>
{{end}}
{{range .Collections}}
	{{template "collection_card" .}}
{{end}}
</div>
{{end}}
