{{define "content"}}
<section class="card">
	<div><a href="/links/{{.Link.ID}}">← back</a> · <a href="{{.Link.URL}}" target="_blank" rel="noopener">open original</a></div>
	<h1 style="margin:.4rem 0 0">{{if .Link.Title}}{{.Link.Title}}{{else}}{{.Link.URL}}{{end}}</h1>
	<div class="url">{{.Link.URL}}</div>
</section>

<article class="card reader" style="max-width:680px;margin:0 auto;line-height:1.65;font-family:Georgia,serif;font-size:1.05rem">
	{{.Article}}
</article>

<style>
.reader h1, .reader h2, .reader h3 { line-height:1.25; margin-top:1.4rem }
.reader p  { margin: .9rem 0 }
.reader pre { background:#f4f4f6; padding:.75rem; border-radius:6px; overflow:auto }
.reader code { background:#f4f4f6; padding:.1rem .3rem; border-radius:3px }
.reader blockquote { border-left:3px solid #ccc; margin:1rem 0; padding:.2rem 1rem; color:#444 }
.reader img { max-width:100%; height:auto; border-radius:6px }
</style>
{{end}}
