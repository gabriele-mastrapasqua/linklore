{{define "base"}}<!doctype html>
<html lang="en" data-theme="{{.Theme}}">
<head>
	<meta charset="utf-8">
	<title>{{.Title}} · linklore</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
	<link rel="apple-touch-icon" href="/static/favicon.svg">
	<meta name="description" content="Linklore — local-first bookmark manager. Your library, not theirs.">
	<meta property="og:title" content="linklore — bookmarks you actually own">
	<meta property="og:description" content="Local-first bookmark manager with full-text search, semantic search and a private RAG chat over everything you've saved.">
	<meta property="og:type" content="website">
	<meta property="og:image" content="/static/favicon.svg">
	<meta name="theme-color" content="#7c3aed">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="/static/app.css?v=8">
	<script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
	<script src="/static/dnd.js" defer></script>
	<script src="/static/events.js" defer></script>
	<script src="/static/lightbox.js" defer></script>
	<script src="/static/bulk.js" defer></script>
	<script src="/static/views.js" defer></script>
	<script src="/static/keys.js" defer></script>
	<script src="/static/toasts.js" defer></script>
	<script src="/static/drawer.js" defer></script>
	<script src="/static/ctxmenu.js" defer></script>
	<script src="/static/palette.js" defer></script>
</head>
<body class="{{if .Previews}}previews-on{{else}}previews-off{{end}}">
<header class="topbar">
	<h1>
		<a href="/" class="brand" title="Bookmarks you actually own">
			<svg class="brand-mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" aria-hidden="true">
				<defs>
					<linearGradient id="bm" x1="0" y1="0" x2="0" y2="1">
						<stop offset="0%" stop-color="#7c3aed"/>
						<stop offset="100%" stop-color="#2563eb"/>
					</linearGradient>
				</defs>
				<path d="M16 3 C 9 13, 5 18, 5 22 a11 11 0 0 0 22 0 c 0 -4 -4 -9 -11 -19 z" fill="url(#bm)"/>
				<path d="M14 14 v8 h6" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
			</svg>
			<span class="brand-word">linklore</span>
		</a>
	</h1>
	<div class="topbar-search">
		<input type="search" name="q" placeholder="search…"
		       hx-get="/search/live" hx-trigger="keyup changed delay:300ms" hx-target="#search-results">
		<a class="topbar-ask ai-link" href="/chat" title="Ask the LLM (✦)">✦</a>
		<kbd class="topbar-kbd" title="⌘K opens command palette · / focuses search">⌘K</kbd>
	</div>
	<span id="worker-status" hx-get="/worker/status" hx-trigger="load, every 5s" hx-swap="innerHTML"></span>
	<nav class="topbar-nav">
		<div class="topbar-nav-main">
			<a href="/">collections</a>
			<a href="/tags">tags</a>
			<a href="/duplicates">dupes</a>
			<a href="/checks" title="dead-link checker">checks</a>
			<a href="/bookmarklet" title="Bookmarklet" aria-label="Bookmarklet">📎<span class="sr-only">Bookmarklet</span></a>
		</div>
		<div class="topbar-nav-side">
			<span id="llm-status" hx-get="/healthz/llm" hx-trigger="load, every 30s" hx-swap="innerHTML"></span>
			<a href="/chat" class="ai-link">✦ chat</a>
			<a href="/settings" title="Settings" aria-label="Settings">⚙<span class="sr-only">Settings</span></a>
			<button class="pref-btn" hx-post="/preferences/previews" hx-swap="none" title="toggle image previews">
				previews: <strong>{{if .Previews}}on{{else}}off{{end}}</strong>
			</button>
			<form hx-post="/preferences/theme" hx-swap="none" style="display:inline;margin:0">
				<input type="hidden" name="theme" value="{{if eq .Theme "auto"}}light{{else if eq .Theme "light"}}dark{{else}}auto{{end}}">
				<button class="pref-btn" type="submit" title="cycle theme: auto → light → dark">
					theme: <strong>{{.Theme}}</strong>
				</button>
			</form>
		</div>
	</nav>
</header>
<div class="layout">
	{{if not .HideSidebar}}{{template "sidebar" .}}{{end}}
	<main>
		<div id="search-results"></div>
		{{template "content" .}}
	</main>
</div>

<aside id="drawer" class="drawer" hidden>
	<div id="drawer-content"></div>
</aside>
<div id="drawer-backdrop" class="drawer-backdrop" hidden onclick="linklore.drawerClose()"></div>
</body>
</html>{{end}}
