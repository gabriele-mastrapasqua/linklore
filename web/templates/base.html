{{define "base"}}<!doctype html>
<html lang="en" data-theme="{{.Theme}}">
<head>
	<meta charset="utf-8">
	<title>{{.Title}} · linklore</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="/static/app.css">
	<script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
	<script src="/static/dnd.js" defer></script>
	<script src="/static/events.js" defer></script>
	<script src="/static/lightbox.js" defer></script>
	<script src="/static/bulk.js" defer></script>
	<script src="/static/views.js" defer></script>
	<script src="/static/keys.js" defer></script>
	<script src="/static/toasts.js" defer></script>
	<script src="/static/drawer.js" defer></script>
	<script src="/static/ctxmenu.js" defer></script>
	<script src="/static/palette.js" defer></script>
</head>
<body class="{{if .Previews}}previews-on{{else}}previews-off{{end}}">
<header class="topbar">
	<h1><a href="/">linklore</a></h1>
	<div class="topbar-search">
		<input type="search" name="q" placeholder="search…"
		       hx-get="/search/live" hx-trigger="keyup changed delay:300ms" hx-target="#search-results">
		<a class="topbar-ask ai-link" href="/chat" title="Ask the LLM (✦)">✦</a>
		<kbd class="topbar-kbd" title="⌘K opens command palette · / focuses search">⌘K</kbd>
	</div>
	<span id="worker-status" hx-get="/worker/status" hx-trigger="load, every 5s" hx-swap="innerHTML"></span>
	<span id="llm-status" hx-get="/healthz/llm" hx-trigger="load" hx-swap="innerHTML"></span>
	<nav>
		<a href="/">collections</a>
		<a href="/chat" class="ai-link">✦ chat</a>
		<a href="/tags">tags</a>
		<a href="/duplicates">dupes</a>
		<a href="/bookmarklet">+</a>
		<button hx-post="/preferences/previews" hx-swap="none" title="toggle image previews"
		        style="background:none;border:1px solid var(--border);border-radius:6px;padding:.2rem .5rem;font-size:.8rem;cursor:pointer;color:var(--muted)">
			previews: <strong>{{if .Previews}}on{{else}}off{{end}}</strong>
		</button>
		<form hx-post="/preferences/theme" hx-swap="none" style="display:inline;margin:0">
			<input type="hidden" name="theme" value="{{if eq .Theme "auto"}}light{{else if eq .Theme "light"}}dark{{else}}auto{{end}}">
			<button type="submit" title="cycle theme: auto → light → dark"
			        style="background:none;border:1px solid var(--border);border-radius:6px;padding:.2rem .5rem;font-size:.8rem;cursor:pointer;color:var(--muted)">
				theme: <strong>{{.Theme}}</strong>
			</button>
		</form>
	</nav>
</header>
<div class="layout">
	{{if not .HideSidebar}}{{template "sidebar" .}}{{end}}
	<main>
		<div id="search-results"></div>
		{{template "content" .}}
	</main>
</div>

<aside id="drawer" class="drawer" hidden>
	<div id="drawer-content"></div>
</aside>
<div id="drawer-backdrop" class="drawer-backdrop" hidden onclick="linklore.drawerClose()"></div>
</body>
</html>{{end}}
