# Linklore — non-secret tunables only. SAFE TO COMMIT.
#
# LLM endpoint, API key and model names are NOT loaded from this file.
# They live in .env (gitignored) so private values never end up in git.
# See .env.example for the env-var names.

server:
  addr: "127.0.0.1:8080"

database:
  path: "./data/linklore.db"

worker:
  concurrency: 4
  embed_batch_size: 32
  fetch_timeout_seconds: 15

extract:
  headless_fallback: false
  archive_html: false
  min_readable_chars: 200

chunking:
  target_tokens: 800
  overlap_tokens: 100
  min_tokens: 40

tags:
  max_per_link: 5
  active_cap: 200
  reuse_distance: 1

ui:
  show_images_default: false
  reader_font: "serif"
  reader_width: "narrow"
