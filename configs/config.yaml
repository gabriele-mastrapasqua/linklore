server:
  addr: "127.0.0.1:8080"

database:
  path: "./data/linklore.db"

# LLM backend. Set to "none" to run without an LLM (search degrades to
# BM25-only, chat is disabled, ingestion still fetches + extracts).
# "ollama" talks to a local Ollama daemon; "litellm" talks to any
# LiteLLM-compatible OpenAI gateway (LiteLLM itself, llama.cpp's
# server, vLLM, etc).
llm:
  backend: "none"              # none | ollama | litellm

  litellm:
    # LiteLLM / OpenAI-compatible gateway. Empty base_url disables this
    # backend cleanly. Override with LITELLM_BASE_URL.
    base_url: ""
    model: ""
    embed_model: ""
    # Optional master key. Override with LITELLM_API_KEY env var.
    api_key: "${LITELLM_API_KEY}"
    timeout_seconds: 600

  ollama:
    # Default Ollama runs on localhost. Override with OLLAMA_HOST.
    host: "http://localhost:11434"
    model: ""
    embed_model: ""
    num_ctx: 32768
    timeout_seconds: 600

worker:
  concurrency: 4
  embed_batch_size: 32
  fetch_timeout_seconds: 15

extract:
  headless_fallback: false
  archive_html: false
  min_readable_chars: 200

chunking:
  target_tokens: 800
  overlap_tokens: 100
  min_tokens: 40

tags:
  max_per_link: 5
  active_cap: 200
  reuse_distance: 1

ui:
  show_images_default: false
  reader_font: "serif"
  reader_width: "narrow"
