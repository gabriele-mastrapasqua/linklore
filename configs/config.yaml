server:
  addr: "127.0.0.1:8080"

database:
  path: "./data/linklore.db"

# LLM backend defaults to LiteLLM in front of vLLM on the DGX (the same
# stack graphrag uses): http://192.168.1.94:8000/v1 + model "qwen36-chat"
# + embed model "nomic-embed". Generate/embed requests stay well under
# vLLM's continuous-batching throughput, which is much faster than Ollama.
llm:
  backend: "litellm"           # litellm | ollama
  litellm:
    base_url: "http://192.168.1.94:8000/v1"
    model: "qwen36-chat"
    embed_model: "nomic-embed"
    # ${LITELLM_API_KEY} expands at load time against process env + the
    # optional .env file. When empty (or unset), the config falls back to
    # "sk-local" — the DGX Spark gateway accepts that as its master key,
    # same default graphrag uses. Set the env var if you ever switch to
    # a per-account key.
    api_key: "${LITELLM_API_KEY}"
    timeout_seconds: 600
  ollama:
    host: "http://192.168.1.94:11434"
    model: "qwen3.6:35b"
    embed_model: "nomic-embed-text"
    num_ctx: 32768
    timeout_seconds: 600

worker:
  concurrency: 4
  embed_batch_size: 32
  fetch_timeout_seconds: 15

extract:
  headless_fallback: false
  archive_html: false
  min_readable_chars: 200

chunking:
  target_tokens: 800
  overlap_tokens: 100
  min_tokens: 40

tags:
  max_per_link: 5
  active_cap: 200
  reuse_distance: 1

ui:
  show_images_default: false
  reader_font: "serif"
  reader_width: "narrow"
