# linklore — example config of non-secret tunables. Safe to commit.
#
# LLM endpoint, API key and model names are NOT loaded from this file.
# They live in .env (gitignored) — see .env.example.
#
# Copy to configs/config.yaml and tweak as needed:
#   cp configs/config.example.yaml configs/config.yaml

server:
  addr: "127.0.0.1:8080"            # bind localhost-only

database:
  path: "./data/linklore.db"

worker:
  concurrency: 4                     # parallel link extractions
  embed_batch_size: 32
  fetch_timeout_seconds: 15

extract:
  headless_fallback: false           # opt-in chromedp fallback
  archive_html: false                # gzip raw HTML to data/snapshots/<id>.html.gz
  min_readable_chars: 200            # below this → fall back to raw <body>

chunking:
  target_tokens: 800
  overlap_tokens: 100
  min_tokens: 40

tags:
  max_per_link: 5
  active_cap: 200
  reuse_distance: 1

ui:
  show_images_default: false
  reader_font: "serif"
  reader_width: "narrow"
